image:
  repository: pub.kiwitcms.eu/kiwitcms/kiwi
  pullPolicy: IfNotPresent
  tag: latest

service:
  type: ClusterIP
  port:
    http: 8080
    https: 8443

ingress:
  enabled: false
  className: nginx
  annotations:
    acme.cert-manager.io/http01-edit-in-place: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
    ingress.kubernetes.io/ssl-redirect: "true"
    kubernetes.io/ingress.allow-http: "false"
    kubernetes.io/tls-acme: "true"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"

  host: kiwi.example.org
  tls:
    enabled: true
    port: 443

resources:
  limits:
    cpu: 300m
    memory: 512Mi
  requests:
    cpu: 200m
    memory: 256Mi

storage:
  # If persistent storage is not enabled, chart will create in-memory directory
  # that will be destroyed upon pod restart
  persistent: true

  # Available class can be listed by "kubectl get storageclasses" command
  class: standard

  # The size of the storgae where uploaded files will be kept
  size: 32Gi

media:
  root: "/Kiwi/uploads"
  url: "/uploads/"

email:
  # SERVER_EMAIL + DEFAULT_FROM_EMAIL Django settings
  from: "kiwi@example.com"
  subject: "[Kiwi-TCMS] "

  # SMTP backend — corresponds to Django EMAIL_HOST / EMAIL_PORT / EMAIL_USE_TLS / EMAIL_USE_SSL.
  # When enabled is false, no SMTP env vars are injected and Django falls back
  # to its default email backend.
  smtp:
    enabled: false

    host: ""
    port: 25
    useTLS: false
    useSSL: false

    # Inline credentials (used only when existingSecret is empty).
    user: ""
    # Set via --set email.smtp.password=... on install
    password: ""

    # Use an existing Secret with keys 'smtp-user' and 'smtp-password'.
    # Takes precedence over inline user/password.
    existingSecret: ""

# Liveness probe — full spec is rendered with toYaml so any field is overridable.
livenessProbe:
  httpGet:
    path: /accounts/login/
    port: http

# Readiness probe — full spec, same defaults as before.
readinessProbe:
  httpGet:
    path: /accounts/login/
    port: http

# Startup probe — disabled by default (empty map).
# Recommended for slow first-time DB migrations, e.g.:
#   startupProbe:
#     httpGet:
#       path: /accounts/login/
#       port: http
#     failureThreshold: 30
#     periodSeconds: 10
startupProbe: {}

# uwsgi override configuration.
# The Kiwi image natively supports loading additional uwsgi config from
# /Kiwi/etc/uwsgi.override (see etc/uwsgi.conf in upstream).
uwsgi:
  # Inline override content. When set (and existingConfigMap is empty),
  # the chart creates a ConfigMap and mounts it as /Kiwi/etc/uwsgi.override.
  # Example:
  #   override: |
  #     [uwsgi]
  #     processes = 8
  #     threads = 2
  #     harakiri = 60
  #     max-requests = 2048
  #     buffer-size = 32768
  override: ""

  # Name of an existing ConfigMap that contains a key "uwsgi.override".
  # When set, this takes precedence over the inline `override` field.
  existingConfigMap: ""

database:
  type: mariadb

  host: kiwi-mariadb
  port: 3306

  # Database can be either external, like managed AWS RDS service, or internal - part of this chart.
  # If it is internal, the dependency mentioned in Chart.yaml will be deployed
  internal: true

  # If external
  db_name: kiwi
  username: kiwi
  # Set a password value via the command line argument:
  # >>> helm upgrade --install --namespace <my_namespace> <helm_repo>/kiwi --set database.password=<my_password>
  # password:

mariadb:
  image:
    debug: true
  # If database is internal, the following config will be used
  auth:
    database: kiwi
    # checkov:skip=CKV_SECRET_6:Base64 High Entropy String
    username: kiwi
    # checkov:skip=CKV_SECRET_6:Base64 High Entropy String
    existingSecret: kiwi-credentials

  primary:
    persistence:
      size: 32Gi

    # Parameters can be taken from here: https://hub.docker.com/r/bitnami/mariadb
    extraEnvVars:
      - name: MARIADB_EXTRA_FLAGS
        value: --bind-address=0.0.0.0 --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
      - name: MARIADB_SKIP_TEST_DB
        value: "yes"

    configuration: |
      [mysqld]
      max-connections=10
      character-set-server=UTF8
      collation-server=utf8mb4_general_ci

  initdbScripts:
    prepare.sh: |
      #!/bin/sh
      mysql -uroot -e "CREATE USER '${MARIADB_USER}'@'%';"
      mysql -uroot -e "SET PASSWORD FOR '${MARIADB_USER}'@'%' = PASSWORD('${MARIADB_PASSWORD}');"

      mysql -uroot -e "CREATE DATABASE IF NOT EXISTS ${MARIADB_DATABASE};"
      mysql -uroot -e "GRANT ALL PRIVILEGES ON ${MARIADB_DATABASE}.* TO '${MARIADB_USER}'@'%' IDENTIFIED BY '${MARIADB_PASSWORD}'; FLUSH PRIVILEGES;"

      mysql -uroot -e "SET PASSWORD FOR 'root'@'localhost' = PASSWORD('${MARIADB_ROOT_PASSWORD}');"
